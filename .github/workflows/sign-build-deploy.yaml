name: Sign, build, and deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version of the artifact to deploy
        required: true
  push:
    branches:
      - master
      - 'hotfix/*'

permissions:
  id-token: write
  contents: read

env:
  ARTIFACT_NAME: aerospike-server
  AWS_ROLE: arn:aws:iam::360255567471:role/sso/assumed/iac/AerospikeDownloadArtifactsAutomation
  JFROG_PROJECT: database
  JFROG_URL: https://aerospike.jfrog.io
  ORG: citrusleaf
  S3_BUCKET: aerospike-qe-build

jobs:
  setup:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || steps.set_env.outputs.version }}
      COUNT:   ${{ steps.set_env.outputs.count }}
      RELEASE: ${{ steps.set_env.outputs.release }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: set env 
        id: set_env
        run: |
          set -euo pipefail
          version=$(git describe --first-parent --tags --always --abbrev=9 --match '*.*.*.*-start' 2>/dev/null)
          if [[ "$version" != *-*-* ]]; then
            version=$(git describe --first-parent --tags --always --abbrev=9 2>/dev/null)
          fi
          if [[ -z "$version" ]]; then
            version=$(git rev-parse --short=9 HEAD)
          fi
          count=$(source .github/bin/artifact_count.bash)
          release=$(source build/version)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "count=$count"     >> "$GITHUB_OUTPUT"
          echo "release=$release" >> "$GITHUB_OUTPUT"

  download-artifacts:
    needs: setup
    if: >
        github.repository_owner == 'citrusleaf' &&
        (
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'push'
        )  
    runs-on: ubuntu-24.04
    outputs:
      PACKAGE_VERSION: ${{ steps.extract_package_version.outputs.package_version }}
    env:
      VERSION: ${{ needs.setup.outputs.VERSION }}
      COUNT: ${{ needs.setup.outputs.COUNT }}
      RELEASE: ${{ needs.setup.outputs.RELEASE }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2 # v2.13.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Install GNU parallel
        run: sudo apt-get update && sudo apt-get install -y parallel

      - name: Wait for builds to complete (30 min)
        if: github.event_name == 'push'
        run: |
          echo "Waiting 30 minutes for builds to complete before downloading artifacts..."
          sleep 1800

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          role-session-name: aerospike-download-artifacts
          aws-region: us-west-1

      # AWS credentials from Configure step above last ~4 hour. Keep retries within that window so token does not expire; use "Re-run failed jobs" in Actions UI for a fresh token if this step fails.
      - name: Download artifacts from QE server (retry until complete)
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08  # v3.0.2
        env:
          GH_EVENT: ${{ github.event_name }}
          S3_PATH: "s3://${{ env.S3_BUCKET }}/${{ env.ORG }}/${{ env.ARTIFACT_NAME }}/${{ env.VERSION }}/build/"
        with:
          timeout_minutes: 240
          max_attempts: 120
          retry_on: error
          retry_wait_seconds: 120
          command: bash .github/bin/download_artifacts.bash

      - name: List download files
        run: find build-artifacts

      - name: Extract package version from artifacts
        id: extract_package_version
        run: |
          set -euo pipefail
          # Prefer .deb: use dpkg-deb to get exact Version
          deb=$(find build-artifacts -maxdepth 1 -name '*.deb' -print -quit)
          if [[ -n "$deb" ]]; then
            pkg_version=$(dpkg-deb -f "$deb" Version)
          else
            echo "Missing debian packages."
            exit 1  
          fi
          echo "package_version=$pkg_version" >> "$GITHUB_OUTPUT"
          echo "Extracted PACKAGE_VERSION: $pkg_version"

      - name: Upload packaged Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: unsigned-artifacts-${{ needs.setup.outputs.VERSION }}
          path: build-artifacts
          overwrite: true
          retention-days: 1

  sign-artifacts:
    needs:
      - setup
      - download-artifacts
    # always() needed because upstream jobs use always()
    if: ${{ always() && needs.setup.result == 'success' && needs.download-artifacts.result == 'success' }}
    uses: aerospike/shared-workflows/.github/workflows/reusable_sign-artifacts.yaml@v3.0.0
    with:
      gh-artifact-name: signed-artifacts-${{ needs.setup.outputs.VERSION }}
      gh-unsigned-artifacts: unsigned-artifacts-${{ needs.setup.outputs.VERSION }}
      gh-workflows-ref: "v2.0.2"
    secrets:
      gpg-private-key: ${{ secrets.GPG_SECRET_KEY }}
      gpg-public-key: ${{ secrets.GPG_PUBLIC_KEY }}
      gpg-key-pass: ${{ secrets.GPG_PASS }}

  upload-artifacts-to-jfrog:
    needs:
      - setup
      - download-artifacts
      - sign-artifacts
    # always() needed because upstream jobs use always()
    if: ${{ always() && needs.sign-artifacts.result == 'success' }}
    uses: aerospike/shared-workflows/.github/workflows/reusable_deploy-artifacts.yaml@v3.0.0
    with:
      jf-project: database
      jf-build-name: "aerospike-server"
      version: ${{ needs.setup.outputs.VERSION }}
      oidc-provider-name: gh-citrusleaf
      oidc-audience: citrusleaf
      gh-artifact-name: signed-artifacts-${{ needs.setup.outputs.VERSION }}
      gh-retention-days: 1
      dry-run: false
      jf-build-id: ${{ needs.setup.outputs.VERSION }}
      jf-metadata-build-id: ${{ needs.setup.outputs.VERSION }}-metadata
      gh-workflows-ref: "v2.0.2"

  create-release-bundle:
    permissions:
      contents: read
      id-token: write
      attestations: write
    needs:
      - setup
      - download-artifacts
      - sign-artifacts
      - upload-artifacts-to-jfrog
    # always() needed because upstream jobs use always()
    if: ${{ always() && needs.setup.result == 'success' && needs.download-artifacts.result == 'success' && needs.sign-artifacts.result == 'success' && needs.upload-artifacts-to-jfrog.result == 'success' }}
    uses: aerospike/shared-workflows/.github/workflows/reusable_create-release-bundle.yaml@v3.0.0
    with:
      jf-project: "database"
      jf-build-names: "aerospike-server:${{ needs.setup.outputs.VERSION }}"
      jf-bundle-name: "aerospike-server"
      oidc-provider-name: gh-citrusleaf
      oidc-audience: citrusleaf
      version: ${{ needs.setup.outputs.VERSION }}
      gh-workflows-ref: "v2.0.2"
      dry-run: false

  promote-to-test:
    needs:
      - setup
      - create-release-bundle
    runs-on: ubuntu-24.04
    if: ${{ always() && needs.create-release-bundle.result == 'success' }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2  # v2.13.3
        with:
          egress-policy: audit

      - name: Setup JFrog CLI
        uses: step-security/setup-jfrog-cli@893a92f96c7727242adf0e603c77b1f2a22390e1 # v4.9.1
        env:
          JF_URL: ${{ env.JFROG_URL }}
          JF_PROJECT: ${{ env.JFROG_PROJECT }}
        with:
          oidc-provider-name: database-gh-citrusleaf
          oidc-audience: database-gh-citrusleaf

      - name: Promote release bundle to TEST
        env:
          JFROG_PROJECT: ${{ env.JFROG_PROJECT }}
          RELEASE_BUNDLE_NAME: aerospike-server
          JF_SIGNING_KEY: aerospike
          VERSION: ${{ needs.setup.outputs.VERSION }}
        run: |
          set -euo pipefail
          echo "Promoting release bundle '${RELEASE_BUNDLE_NAME}:${VERSION}' to TEST environment..."
          jf rbp \
            --signing-key="${JF_SIGNING_KEY}" \
            --project="${JFROG_PROJECT}" \
            --sync=true \
            "${RELEASE_BUNDLE_NAME}" "${VERSION}" TEST

  # Note: Automatic re-run from within the same workflow run is not supported by GitHub
  # (API returns 403 "This workflow is already running"). Use "Re-run failed jobs" from the
  # Actions UI after the run completes, or rely on step-level retries (e.g. download-artifacts).
  # auto-retry job removed to avoid 403 errors.

  notify-slack:
    needs:
      - setup
      - download-artifacts
      - promote-to-test
    runs-on: ubuntu-24.04
    if: ${{ always() && needs.promote-to-test.result == 'success' }}
    env:
      VERSION: ${{ needs.setup.outputs.VERSION }}
      PACKAGE_VERSION: ${{ needs.download-artifacts.outputs.PACKAGE_VERSION }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Get current timestamp
        id: timestamp
        run: echo "time=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"

      - name: Send Slack message to QE
        continue-on-error: true
        uses: step-security/slack-github-action@77483a1a06c0ce2933c1f2f144fb5a85db7f3e80 # v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.QE_SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.QE_SLACK_CHANNEL }}",
              "text": "[${{ steps.timestamp.outputs.time }}] Server Build Id ${{ env.VERSION }} Package Version ${{ env.PACKAGE_VERSION }} promoted to JFrog TEST"
            }

      - name: Send Slack message to CORE
        continue-on-error: true
        uses: step-security/slack-github-action@77483a1a06c0ce2933c1f2f144fb5a85db7f3e80 # v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.DB_SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.DB_SLACK_CHANNEL }}",
              "text": "[${{ steps.timestamp.outputs.time }}] Server Build Id ${{ env.VERSION }} Package Version ${{ env.PACKAGE_VERSION }} promoted to JFrog TEST"
            }
